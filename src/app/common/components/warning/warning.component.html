@if(is_warning) {
<ng-container>
  <div class="warning-block">
    <h3 class="warning-title">Initializing Environment</h3>
    <p class="warning-text">
      Fetching live portfolio data from our cloud services. Please stand by while the secure instance establishes a
      connection (this may take up to 60 seconds).
    </p>
  </div>
</ng-container>
}
