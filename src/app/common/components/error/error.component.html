@if(is_error) {
<ng-container>
  <div class="error-block">
    <h3 class="error-title">Service Temporarily Unavailable</h3>
    <p class="error-text">
      We are unable to retrieve portfolio data at this time. The core API may be undergoing
      routine maintenance. Please refresh the page or try again shortly.
    </p>
  </div>
</ng-container>
}
