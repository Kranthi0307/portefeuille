<div class="bg-image">
  <div class="projects">
    @if(public_service.is_loading()) {
    <app-warning [is_warning]="true"></app-warning>
    } @else if (public_service.info().projects.length === 0) {
    <app-error [is_error]="true"></app-error>
    } @else {
    @for (project of public_service.info().projects; track project) {
    <div class="project-card" (click)="openProject(project?.url)">
      <h3>
        {{ project?.name }}
        <img src="./assets/icons/open-in-new.svg" alt="open-in-new" width="24" height="24" style="float: inline-end;">
      </h3>
      <p>{{ project?.description }}</p>
    </div>
    }
    }
  </div>
</div>
