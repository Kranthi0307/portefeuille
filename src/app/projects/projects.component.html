<div class="bg-image">
  <div class="projects">
    @for (project of projects(); track project) {
    <div class="project-card" (click)="openProject(project?.url)">
      <h3>
        {{ project?.name }}
        <img src="./assets/icons/open-in-new.svg" alt="open-in-new" width="24" height="24" style="float: inline-end;">
      </h3>
      <p>{{ project?.description }}</p>
    </div>
    }
  </div>

  <app-error [isError]="!(projects()?.length > 0)"></app-error>
</div>
