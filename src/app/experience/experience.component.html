<div class="bg-image">
  <div class="work">
    @for (job of public_service.work(); track job) {
    <div class="work-card">
      <h3 class="title">{{job.title}}</h3>
      <h4 class="name">{{job.company}}</h4>
      <p class="date-location">
        <span>{{job.startDate | date: 'MMMM y'}}</span>
        &nbsp;–&nbsp;
        @if (job.endDate) {
        <span>{{job.endDate | date: 'MMMM y'}}</span>
        } @else {
        <span>Present</span>
        }
        &nbsp;•&nbsp;
        <span>{{job.location}}</span>
      </p>
      <p class="description">{{job.description}}</p>
    </div>
    }
  </div>
  <app-error [isError]="!(public_service.work()?.length > 0)"></app-error>
</div>
